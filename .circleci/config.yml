version: 2.1

jobs:
  test:
    docker:
      - image: python:3.12
    working_directory: ~/repo
    steps:
      - checkout

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV

      - restore_cache:
          keys:
            - v2-uv-cache-{{ checksum "pyproject.toml" }}
            - v2-uv-cache-

      - run:
          name: Install dependencies
          command: |
            uv sync --all-extras

      - save_cache:
          paths:
            - ~/.cache/uv
          key: v2-uv-cache-{{ checksum "pyproject.toml" }}

      - run:
          name: Run linter
          command: |
            uv run ruff check .

      - run:
          name: Run tests
          command: |
            uv run pytest --junitxml=test-results/junit.xml

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: test-results
          destination: test-results

  deploy:
    docker:
      - image: python:3.12
    working_directory: ~/repo
    steps:
      - checkout

      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV

      - run:
          name: Verify git tag vs. version
          command: |
            VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
            if [ "$CIRCLE_TAG" != "$VERSION" ]; then
              echo "Git tag: $CIRCLE_TAG does not match the version of this app: $VERSION"
              exit 1
            fi

      - run:
          name: Build package
          command: |
            uv build

      - run:
          name: Upload to PyPI
          command: |
            uv tool install twine
            uv tool run twine upload dist/* -u __token__ -p $PYPI_TOKEN

workflows:
  version: 2
  test:
    jobs:
      - test

  deploy:
    jobs:
      - test:
          filters:
            tags:
              only: /.*/
      - deploy:
          requires:
            - test
          filters:
            tags:
              only: /[0-9]+(\.[0-9]+)*/
            branches:
              ignore: /.*/
